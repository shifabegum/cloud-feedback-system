<!DOCTYPE html>
<html>
<head>
    <title>Cloud Feedback System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="background"></div>

<div class="container">
    <h1>☁ Cloud Feedback System</h1>
    <p class="subtitle">We value your feedback</p>

    {% if success %}
        <div class="success-popup">
            ✅ Feedback submitted successfully!
        </div>
    {% endif %}

    <form action="/submit" method="POST">

        <input type="text" name="name" placeholder="Your Name (Optional)">

       <div class="stars">
    <label class="star-row">
        <input type="radio" name="rating" value="5" required>
        <span>⭐⭐⭐⭐⭐</span>
    </label>

    <label class="star-row">
        <input type="radio" name="rating" value="4">
        <span>⭐⭐⭐⭐</span>
    </label>

    <label class="star-row">
        <input type="radio" name="rating" value="3">
        <span>⭐⭐⭐</span>
    </label>

    <label class="star-row">
        <input type="radio" name="rating" value="2">
        <span>⭐⭐</span>
    </label>

    <label class="star-row">
        <input type="radio" name="rating" value="1">
        <span>⭐</span>
    </label>
</div>

        <textarea name="message" placeholder="Enter your feedback..." required></textarea>

        <button type="submit">Submit Feedback</button>
    </form>

    <a href="/admin-login" class="admin-link">🔐 Admin Login</a>
</div>

</body>
</html>
